<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mermas · Larrs</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f7; color: #1e293b; padding: 14px; font-size: 14px; }
.container { max-width: 820px; margin: 0 auto; }
.header { background: linear-gradient(135deg, #111418, #1e293b); border-radius: 12px; padding: 18px 22px; margin-bottom: 12px; color: #fff; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.logo-img { height: 44px; width: auto; display: block; }
.header .title { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-top: 10px; }
.header .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.toolbar { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
.toolbar select { font-size: 13px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 9px; color: #1e293b; background: #f8fafc; }
.section-title { font-size:11px; font-weight:700; color:#334155; text-transform:uppercase; letter-spacing:.06em; margin:0 0 8px; }
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
.form-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:16px; margin-bottom:12px; }
.form-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; }
.form-field { display:flex; flex-direction:column; gap:4px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label { font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
.form-field input, .form-field select, .form-field textarea { font-size:13px; border:1px solid #e2e8f0; border-radius:6px; padding:8px 10px; color:#1e293b; background:#f8fafc; font-family:inherit; }
.form-field textarea { resize:vertical; min-height:54px; }
.btn { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.msg { font-size:12px; border-radius:8px; padding:9px 13px; margin-top:10px; display:none; }
.msg.ok { display:block; background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d; }
.msg.err { display:block; background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; }
table { width: 100%; border-collapse: collapse; }
th { padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; background: #f8fafc; }
th.r, td.r { text-align: right; }
td { padding: 7px 10px; border-top: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }
tr:hover td { background: #f8fafc; }
.empty { padding: 30px; text-align: center; color: #94a3b8; font-size: 13px; }
.motivo-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; background:#fef2f2; color:#b91c1c; white-space:nowrap; }
.last { font-size: 11px; color: #b0bac8; text-align: center; margin-top: 6px; }
@media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <img class="logo-img" src="https://heladerialarrs.cl/cdn/shop/t/2/assets/logo-footer.png?v=41616879924709803011609269083" alt="Larrs">
      <div class="title">Registro de mermas</div>
      <div class="subtitle" id="header-sub">Cargando...</div>
    </div>
  </div>

  <div class="toolbar" id="admin-toolbar" style="display:none">
    <label>Tienda</label>
    <select id="tienda-select" onchange="onTiendaChange()"></select>
  </div>

  <div class="form-card">
    <div class="section-title">Registrar merma</div>
    <form id="merma-form" onsubmit="submitMerma(event)">
      <div class="form-grid">
        <div class="form-field">
          <label>Fecha</label>
          <input type="date" id="f-fecha" required>
        </div>
        <div class="form-field">
          <label>Categoría</label>
          <select id="f-categoria" onchange="onCategoriaChange()" required>
            <option value="">Cargando categorías...</option>
          </select>
        </div>
        <div class="form-field">
          <label>Producto</label>
          <select id="f-producto" onchange="onProductoChange()" required>
            <option value="">Selecciona una categoría primero</option>
          </select>
        </div>
        <div class="form-field full" id="producto-libre-wrap" style="display:none">
          <label>Especifica el producto</label>
          <input type="text" id="f-producto-libre" placeholder="Ej: Vasos de cartón 12oz">
        </div>
        <div class="form-field">
          <label>Cantidad</label>
          <input type="number" id="f-cantidad" min="0" step="0.01" required>
        </div>
        <div class="form-field">
          <label>Unidad</label>
          <select id="f-unidad">
            <option value="kg">kg</option>
            <option value="un">un</option>
            <option value="L">L</option>
          </select>
        </div>
        <div class="form-field full">
          <label>Motivo</label>
          <select id="f-motivo" onchange="onMotivoChange()" required>
            <option value="">Selecciona un motivo...</option>
            <option>Vencido / fecha de expiración</option>
            <option>Dañado en producción</option>
            <option>Roto / derrame (bandeja, envase)</option>
            <option>Falla de frío / cadena de frío</option>
            <option>Error de despacho o traslado</option>
            <option>Prueba / degustación</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="form-field full" id="motivo-detalle-wrap" style="display:none">
          <label>Detalle del motivo</label>
          <input type="text" id="f-motivo-detalle" placeholder="Especifica el motivo...">
        </div>
        <div class="form-field full">
          <label>Observaciones (opcional)</label>
          <textarea id="f-observaciones" placeholder="Detalles adicionales..."></textarea>
        </div>
      </div>
      <button class="btn" type="submit" id="submit-btn" style="margin-top:14px">Registrar merma</button>
      <div class="msg" id="form-msg"></div>
    </form>
  </div>

  <div class="section-title">Histórico reciente</div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th id="th-tienda" style="display:none">Tienda</th>
          <th>Producto</th>
          <th class="r">Cantidad</th>
          <th>Motivo</th>
          <th>Reportado por</th>
        </tr>
      </thead>
      <tbody id="historial-body">
        <tr><td colspan="6" class="empty">Cargando histórico...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="last" id="last-update"></div>
</div>

<script>
const TIENDAS = ['Costanera', 'Dominicos', 'Trapenses'];
const tiendaFija = window._LARRS_TIENDA || null;
let tiendaActiva = tiendaFija || 'Todas';

function fmtNum(n) {
  return Number(n).toLocaleString('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function initHeader() {
  const sub = document.getElementById('header-sub');
  if (tiendaFija) {
    sub.textContent = tiendaFija;
  } else {
    sub.textContent = 'Todas las tiendas';
    const toolbar = document.getElementById('admin-toolbar');
    toolbar.style.display = 'flex';
    const sel = document.getElementById('tienda-select');
    sel.innerHTML = ['Todas', ...TIENDAS].map(t => `<option value="${t}">${t}</option>`).join('');
    document.getElementById('th-tienda').style.display = '';
  }
}

function onTiendaChange() {
  tiendaActiva = document.getElementById('tienda-select').value;
  loadHistorial();
}

function onMotivoChange() {
  const isOtro = document.getElementById('f-motivo').value === 'Otro';
  document.getElementById('motivo-detalle-wrap').style.display = isOtro ? 'flex' : 'none';
}

let catalogo = [];

async function loadCatalogo() {
  const catSel = document.getElementById('f-categoria');
  try {
    const resp = await fetch('/api/mermas/catalogo');
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Error al cargar catálogo');
    catalogo = data.categorias || [];
  } catch (e) {
    catalogo = [];
  }
  const opts = catalogo.map(c => `<option value="${esc(c.value)}">${esc(c.label)}</option>`);
  opts.push('<option value="OTRO">Otro (no está en la lista)</option>');
  catSel.innerHTML = '<option value="">Selecciona una categoría...</option>' + opts.join('');
  onCategoriaChange();
}

function onCategoriaChange() {
  const catValue = document.getElementById('f-categoria').value;
  const prodSel = document.getElementById('f-producto');
  const cat = catalogo.find(c => c.value === catValue);

  if (catValue === 'OTRO') {
    prodSel.innerHTML = '<option value="__otro__">Especificar producto</option>';
    prodSel.value = '__otro__';
  } else if (cat) {
    const opts = cat.productos.map(p => `<option value="${esc(p)}">${esc(p)}</option>`);
    opts.push('<option value="__otro__">Otro (no está en la lista)</option>');
    prodSel.innerHTML = '<option value="">Selecciona un producto...</option>' + opts.join('');
  } else {
    prodSel.innerHTML = '<option value="">Selecciona una categoría primero</option>';
  }
  onProductoChange();
}

function onProductoChange() {
  const isOtro = document.getElementById('f-producto').value === '__otro__';
  document.getElementById('producto-libre-wrap').style.display = isOtro ? 'flex' : 'none';
}

function motivoBadgeColor(motivo) {
  return motivo === 'Otro' ? '#eff6ff' : '#fef2f2';
}

async function loadHistorial() {
  const tbody = document.getElementById('historial-body');
  tbody.innerHTML = '<tr><td colspan="6" class="empty">Cargando histórico...</td></tr>';
  try {
    const qs = (!tiendaFija && tiendaActiva !== 'Todas') ? `?tienda=${encodeURIComponent(tiendaActiva)}` : '';
    const resp = await fetch('/api/mermas' + qs);
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Error al cargar histórico');
    renderHistorial(data.items || []);
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Error: ${e.message}</td></tr>`;
  }
  document.getElementById('last-update').textContent = `Actualizado: ${new Date().toLocaleString('es-CL')}`;
}

function renderHistorial(items) {
  const tbody = document.getElementById('historial-body');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Sin registros todavía.</td></tr>';
    return;
  }
  const showTienda = !tiendaFija;
  tbody.innerHTML = items.map(it => `
    <tr>
      <td style="font-size:12px">${esc(it.fecha) || '—'}</td>
      ${showTienda ? `<td style="font-size:12px">${esc(it.tienda) || '—'}</td>` : ''}
      <td style="font-size:12px">${esc(it.producto) || '—'}</td>
      <td class="r" style="font-size:12px">${fmtNum(it.cantidad)} ${esc(it.unidad)}</td>
      <td><span class="motivo-badge" style="background:${motivoBadgeColor(it.motivo)}">${esc(it.motivo) || '—'}</span></td>
      <td style="font-size:11px;color:#64748b">${esc(it.reportado_por) || '—'}</td>
    </tr>
  `).join('');
}

async function submitMerma(evt) {
  evt.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('form-msg');
  msg.className = 'msg';
  msg.textContent = '';

  const categoria = document.getElementById('f-categoria').value;
  const productoSel = document.getElementById('f-producto').value;
  const producto = productoSel === '__otro__'
    ? document.getElementById('f-producto-libre').value.trim()
    : productoSel;

  const payload = {
    fecha: document.getElementById('f-fecha').value,
    tienda: tiendaFija || document.getElementById('tienda-select').value,
    producto,
    categoria_producto: categoria,
    cantidad: parseFloat(document.getElementById('f-cantidad').value),
    unidad: document.getElementById('f-unidad').value,
    motivo: document.getElementById('f-motivo').value,
    motivo_detalle: document.getElementById('f-motivo-detalle').value.trim(),
    observaciones: document.getElementById('f-observaciones').value.trim(),
  };

  if (!payload.tienda || payload.tienda === 'Todas') {
    msg.className = 'msg err';
    msg.textContent = 'Selecciona una tienda antes de registrar.';
    return;
  }
  if (!categoria) {
    msg.className = 'msg err';
    msg.textContent = 'Selecciona una categoría.';
    return;
  }
  if (!producto) {
    msg.className = 'msg err';
    msg.textContent = 'Selecciona o especifica un producto.';
    return;
  }

  btn.disabled = true;
  try {
    const resp = await fetch('/api/mermas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Error al registrar');

    msg.className = 'msg ok';
    msg.textContent = 'Merma registrada correctamente.';
    document.getElementById('merma-form').reset();
    document.getElementById('f-fecha').value = new Date().toISOString().slice(0, 10);
    onCategoriaChange();
    onMotivoChange();
    loadHistorial();
  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('f-fecha').value = new Date().toISOString().slice(0, 10);
initHeader();
loadCatalogo();
loadHistorial();
</script>
</body>
</html>
